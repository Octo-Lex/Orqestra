name: Install Issue
description: Report a problem installing Orqestra
labels: ["install", "beta"]
body:
  - type: input
    id: os
    attributes:
      label: OS Version
      placeholder: "e.g., Windows 11 23H2 x64"
    validations:
      required: true
  - type: input
    id: installer
    attributes:
      label: Installer Filename
      placeholder: "e.g., Orqestra_1.0.9_x64-setup.exe or Orqestra_1.0.9_x64.AppImage"
    validations:
      required: true
  - type: dropdown
    id: sha_verified
    attributes:
      label: SHA256 Verified
      description: Did you verify the installer SHA256 against checksums.txt?
      options:
        - "yes"
        - "no"
    validations:
      required: true
  - type: dropdown
    id: platform_type
    attributes:
      label: Platform Type
      options:
        - "Windows (NSIS installer)"
        - "Linux (AppImage)"
    validations:
      required: true
  - type: dropdown
    id: signature_status
    attributes:
      label: Signature Status
      description: Windows: `Get-AuthenticodeSignature .\Orqestra_*.exe`. Linux: N/A.
      options:
        - "NotSigned (expected for current beta)"
        - "N/A (Linux AppImage)"
        - "Valid (signed)"
        - "HashMismatch"
        - "did not check"
    validations:
      required: true
  - type: dropdown
    id: smartscreen
    attributes:
      label: SmartScreen Warning Appeared
      description: Windows only. Linux users select N/A.
      options:
        - "yes"
        - "no"
        - "N/A (Linux)"
    validations:
      required: true
  - type: dropdown
    id: install_result
    attributes:
      label: Install Result
      options:
        - "Installer ran but app does not launch"
        - "Installer failed to run"
        - "Browser blocked the download"
        - "Antivirus blocked the install"
        - "Other"
    validations:
      required: true
  - type: dropdown
    id: launch_result
    attributes:
      label: Launch Result
      options:
        - "App launches successfully"
        - "App crashes on launch"
        - "App does not open (no error)"
        - "Error message shown"
        - "Did not reach this step"
    validations:
      required: true
  - type: input
    id: install_location
    attributes:
      label: Install Location
      placeholder: "e.g., C:\\Program Files\\Orqestra\\"
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: Details / Logs
      description: Terminal output, error messages, or screenshots. See [Installer Diagnostics](https://github.com/Elephant-Rock-Lab/Orqestra/blob/master/docs/installer-diagnostics.md) for diagnostic steps. **Do not paste API keys, tokens, secrets, or .env files.**
    validations:
      required: false
  - type: checkboxes
    id: secrets_check
    attributes:
      label: Secrets Confirmation
      options:
        - label: I have removed all API keys, tokens, and secrets from this issue
          required: true
