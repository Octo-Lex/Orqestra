name: Bug Report
description: Report a bug in Orqestra
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Orqestra Version
      description: Which version are you running? (shown in Setup panel or README)
      placeholder: "e.g., v1.0.6"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Operating system and version
      placeholder: "e.g., Windows 11 x64"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: What did you do?
      placeholder: |
        1. Open Orqestra
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs or drag screenshots here. **Do not paste API keys, tokens, or secrets.**
    validations:
      required: false
