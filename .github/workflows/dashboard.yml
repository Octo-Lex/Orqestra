name: Dashboard

on:
  push:
    branches: [master]
    paths:
      - 'roadmap/**'
      - 'crates/md-indexer/**'
      - 'apps/dashboard/**'
      - '.github/workflows/dashboard.yml'
  pull_request:
    paths:
      - 'roadmap/**'
      - 'crates/md-indexer/**'
      - 'apps/dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test md-indexer
        run: cargo test -p md-indexer

      - name: Install dashboard dependencies
        run: cd apps/dashboard && npm ci

      - name: Run dashboard tests
        run: cd apps/dashboard && npx vitest run

      - name: Export roadmap JSON from roadmap/
        run: cargo run --bin orqestra -- export --project-root . --format=json --out apps/dashboard/public/orqestra-roadmap.json

      - name: Build dashboard
        run: cd apps/dashboard && npm run build

      - name: Scan built bundle for forbidden strings
        run: |
          if grep -R 'master-secret' apps/dashboard/dist/ 2>/dev/null; then
            echo "FAIL: master-secret found in built dashboard bundle"
            exit 1
          fi
          if grep -R 'Authenticated (admin)' apps/dashboard/dist/ 2>/dev/null; then
            echo "FAIL: admin auth badge found in built dashboard bundle"
            exit 1
          fi
          if grep -R 'Authenticated (write)' apps/dashboard/dist/ 2>/dev/null; then
            echo "FAIL: write auth badge found in built dashboard bundle"
            exit 1
          fi
          echo "PASS: Built dashboard bundle is clean"

      - name: Verify generated JSON exists
        run: test -f apps/dashboard/public/orqestra-roadmap.json && echo "JSON export verified"

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist

  deploy-dashboard:
    needs: build-dashboard
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist

      - name: Check Cloudflare deployment configuration
        id: cloudflare-config
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare credentials are not configured; skipping Pages deployment."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Cloudflare Pages
        if: steps.cloudflare-config.outputs.deploy == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/dashboard/dist --project-name=orqestra
