name: Dashboard

on:
  push:
    branches: [master]
    paths:
      - 'roadmap/**'
      - 'crates/md-indexer/**'
      - 'apps/dashboard/**'
      - '.github/workflows/dashboard.yml'
  pull_request:
    paths:
      - 'roadmap/**'
      - 'crates/md-indexer/**'
      - 'apps/dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test md-indexer
        run: cargo test -p md-indexer

      - name: Install dashboard dependencies
        run: cd apps/dashboard && npm ci

      - name: Run dashboard tests
        run: cd apps/dashboard && npx vitest run

      - name: Export roadmap JSON from roadmap/
        run: cargo run --bin orqestra -- export --project-root . --format=json --out apps/dashboard/public/orqestra-roadmap.json

      - name: Build dashboard
        run: cd apps/dashboard && npm run build

      - name: Scan built bundle for forbidden strings
        run: |
          if grep -R 'master-secret' apps/dashboard/dist/ 2>/dev/null; then
            echo "FAIL: master-secret found in built dashboard bundle"
            exit 1
          fi
          if grep -R 'Authenticated (admin)' apps/dashboard/dist/ 2>/dev/null; then
            echo "FAIL: admin auth badge found in built dashboard bundle"
            exit 1
          fi
          if grep -R 'Authenticated (write)' apps/dashboard/dist/ 2>/dev/null; then
            echo "FAIL: write auth badge found in built dashboard bundle"
            exit 1
          fi
          echo "PASS: Built dashboard bundle is clean"

      - name: Verify generated JSON exists
        run: test -f apps/dashboard/public/orqestra-roadmap.json && echo "JSON export verified"

      - name: Validate evidence schema in generated JSON
        run: |
          python3 -c "
          import json, sys
          with open('apps/dashboard/public/orqestra-roadmap.json') as f:
              d = json.load(f)
          e = d.get('evidence')
          if e is None:
              print('FAIL: evidence section missing from generated dashboard export')
              sys.exit(1)
          sv = e.get('schema_version')
          if sv != 1:
              print(f'FAIL: evidence.schema_version is {sv}, expected 1')
              sys.exit(1)
          for field in ['release_history', 'test_counts', 'security_boundaries', 'autonomy_policy', 'runtime_evidence']:
              if field not in e:
                  print(f'FAIL: evidence missing field: {field}')
                  sys.exit(1)
          rt = e.get('runtime_evidence', {})
          if rt.get('evidence_type') != 'structural-runtime-decision-matrix':
              print(f'FAIL: runtime evidence_type is {rt.get("evidence_type")}')
              sys.exit(1)
          if rt.get('external_beta_user_data') != False:
              print('FAIL: runtime external_beta_user_data must be false')
              sys.exit(1)
          ap = e.get('autonomy_policy', {})
          if ap.get('max_session_cap') != 10:
              print(f'FAIL: autonomy max_session_cap is {ap.get("max_session_cap")}, expected 10')
              sys.exit(1)
          if ap.get('auto_commit') != False:
              print('FAIL: autonomy auto_commit must be false')
              sys.exit(1)
          print('PASS: Evidence schema validated')
          "

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist

  deploy-dashboard:
    needs: build-dashboard
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist

      - name: Check Cloudflare deployment configuration
        id: cloudflare-config
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare credentials are not configured; skipping Pages deployment."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Cloudflare Pages
        if: steps.cloudflare-config.outputs.deploy == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/dashboard/dist --project-name=orqestra
