name: Secret Scanning

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-current-tree:
    name: Current-tree secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for common secret patterns
        run: |
          # Check for common secret patterns in tracked files
          echo "Scanning for secret patterns in current tree..."
          FOUND=0
          
          # AWS keys
          if git ls-files -z | xargs -0 grep -l 'AKIA[0-9A-Z]{16}' -- 2>/dev/null; then
            echo "FAIL: AWS access key found"
            FOUND=1
          fi
          
          # Generic API key patterns (long hex/base64 strings in .env files)
          if git ls-files -z | xargs -0 grep -lE '(api_key|api_token|secret_key|access_token)\s*=\s*[A-Za-z0-9]{20,}' --include='*.env' --include='*.env.*' 2>/dev/null; then
            echo "WARN: Potential secret in tracked .env file"
            FOUND=1
          fi
          
          # Private key patterns
          if git ls-files -z | xargs -0 grep -l 'BEGIN.*PRIVATE KEY' -- 2>/dev/null; then
            echo "FAIL: Private key found in tracked files"
            FOUND=1
          fi
          
          # Hardcoded master token
          if git ls-files -z | xargs -0 grep -l 'default-master-token' -- 2>/dev/null; then
            echo "FAIL: Hardcoded master token found"
            FOUND=1
          fi
          
          if [ "$FOUND" -ne 0 ]; then
            echo "::error::Secret patterns detected in tracked files"
            exit 1
          fi
          echo "PASS: No secret patterns detected"

      - name: Verify .env files are gitignored
        run: |
          tracked=$(git ls-files '*.env' '.env*' 2>/dev/null || true)
          if [ -n "$tracked" ]; then
            echo "FAIL: .env files are tracked in git:"
            echo "$tracked"
            exit 1
          fi
          echo "PASS: No .env files tracked"

      - name: Verify CSP is not null
        run: |
          csp=$(python3 -c "
          import json
          with open('apps/desktop/src-tauri/tauri.conf.json') as f:
              d = json.load(f)
          csp = d.get('app',{}).get('security',{}).get('csp')
          if csp is None:
              print('null')
          elif isinstance(csp, dict):
              print('dict')
          else:
              print(str(csp))
          ")
          if [ "$csp" = "null" ]; then
            echo "FAIL: CSP is null"
            exit 1
          fi
          echo "PASS: CSP is configured ($csp)"

      - name: Verify no hardcoded master token
        run: |
          if grep -r 'default-master-token' apps/desktop/src-tauri/src/ --include='*.rs' 2>/dev/null; then
            echo "FAIL: Hardcoded master token found"
            exit 1
          fi
          echo "PASS: No hardcoded master token"

      - name: Verify patch checksum uses SHA-256
        run: |
          if grep -q 'DefaultHasher' apps/desktop/src-tauri/src/security/patch_guard.rs 2>/dev/null; then
            echo "FAIL: DefaultHasher still in patch_guard.rs"
            exit 1
          fi
          if grep -q 'sha2' apps/desktop/src-tauri/src/security/patch_guard.rs 2>/dev/null; then
            echo "PASS: SHA-256 in patch_guard.rs"
          else
            echo "FAIL: SHA-256 not found in patch_guard.rs"
            exit 1
          fi
