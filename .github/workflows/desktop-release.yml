name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: orqestra-windows-x64
          - os: macos-latest
            artifact-name: orqestra-macos-universal
          - os: ubuntu-latest
            artifact-name: orqestra-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install desktop npm dependencies
        run: cd apps/desktop && npm ci

      - name: Run workspace Rust tests
        run: cargo test --workspace

      - name: Build desktop frontend
        run: cd apps/desktop && npm run build

      - name: Build Tauri bundle (Windows/Linux)
        if: runner.os != 'macOS'
        run: cd apps/desktop && npx tauri build

      - name: Build Tauri bundle (macOS universal)
        if: runner.os == 'macOS'
        run: cd apps/desktop && npx tauri build --target universal-apple-darwin

      - name: Rename Linux AppImage to canonical name
        if: runner.os == 'Linux'
        shell: bash
        run: |
          APPIMAGE=$(find target/release/bundle/appimage -name '*.AppImage' 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            CANONICAL="$(dirname "$APPIMAGE")/Orqestra_1.0.10_x64.AppImage"
            mv "$APPIMAGE" "$CANONICAL"
            echo "Renamed to Orqestra_1.0.10_x64.AppImage"
          else
            echo "No AppImage found to rename"
          fi

      - name: Compute SHA256 checksums
        shell: bash
        run: |
          mkdir -p dist
          echo "# SHA256 checksums for Orqestra ${{ github.ref_name }}" > dist/checksums.txt
          echo "# Generated by CI run ${{ github.run_id }}" >> dist/checksums.txt
          echo "# Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/checksums.txt
          echo "" >> dist/checksums.txt
          find target -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null | while read f; do
            if command -v sha256sum &>/dev/null; then
              HASH=$(sha256sum "$f" | cut -d' ' -f1)
            else
              HASH=$(certutil -hashfile "$f" SHA256 | grep -v ":" | tr -d ' \r\n')
            fi
            BASENAME=$(basename "$f")
            echo "${HASH}  ${BASENAME}" >> dist/checksums.txt
            echo "  ${BASENAME}: ${HASH}"
          done

      - name: Smoke check - verify installer artifact exists
        shell: bash
        run: |
          echo "Searching for installer artifacts..."
          find target -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null | head -20
          if find target -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null | read; then
            echo "Installer artifact found"
          else
            echo "No standard installer artifact found - checking for binary"
            if find target -name "orqestra-desktop" -type f 2>/dev/null | read; then
              echo "Binary found (bundling may not be configured for this platform)"
            else
              echo "No build artifact found"
              exit 1
            fi
          fi

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            target/release/bundle/**
            target/universal-apple-darwin/release/bundle/**
            target/universal-apple-darwin/release/orqestra-desktop
            target/release/orqestra-desktop
            target/release/bundle/orqestra-desktop
            dist/checksums.txt
          retention-days: 30

  create-release:
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release manifest with provenance
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TAG_COMMIT="${GITHUB_SHA}"
          SOURCE_COMMIT="${GITHUB_SHA}"
          DATE=$(date -u +"%Y-%m-%d")
          RUN_ID="${{ github.run_id }}"

          # Find Windows installer
          WIN_INSTALLER=$(find artifacts -name "*.exe" -path "*nsis*" 2>/dev/null | head -1)
          WIN_SHA256=""
          WIN_SIZE=""
          WIN_NAME=""

          if [ -n "$WIN_INSTALLER" ]; then
            WIN_SHA256=$(sha256sum "$WIN_INSTALLER" | cut -d' ' -f1)
            WIN_SIZE=$(stat -c%s "$WIN_INSTALLER" 2>/dev/null || stat -f%z "$WIN_INSTALLER" 2>/dev/null || echo "0")
            WIN_NAME=$(basename "$WIN_INSTALLER")
          fi

          cat > dist/release-manifest.json << EOF
          {
            "release": {
              "name": "Orqestra ${VERSION}",
              "tag": "${VERSION}",
              "channel": "public-beta",
              "release_version": "${VERSION#v}",
              "app_version": "${VERSION#v}",
              "date": "${DATE}"
            },
            "provenance": {
              "tag_commit": "${TAG_COMMIT}",
              "source_commit": "${SOURCE_COMMIT}",
              "build_commit": "${SOURCE_COMMIT}",
              "release_upload_commit": "${SOURCE_COMMIT}",
              "workflow": ".github/workflows/desktop-release.yml",
              "workflow_run_id": "${RUN_ID}",
              "status": "ci-built"
            },
            "artifacts": [
              {
                "name": "${WIN_NAME}",
                "platform": "windows-x64",
                "type": "nsis-installer",
                "sha256": "${WIN_SHA256}",
                "size_bytes": ${WIN_SIZE:-0},
                "signed": false,
                "source": "github-actions"
              }
            ],
            "platforms": {
              "windows-x64": {
                "status": "tested",
                "artifact": "${WIN_NAME}",
                "signed": false,
                "notes": "Unsigned public beta installer"
              },
              "macos-arm64": { "status": "not-built", "artifact": null, "signed": false, "notarized": false, "notes": "Deferred" },
              "macos-x64": { "status": "not-built", "artifact": null, "signed": false, "notarized": false, "notes": "Deferred" },
              "linux-x64": { "status": "built-but-unverified", "artifact": null, "signed": false, "notes": "Not recommended for public beta users" }
            },
            "verification": {
              "rust_tests": "pass",
              "desktop_ts_build": "pass",
              "dashboard_ts_build": "pending",
              "windows_smoke": "ci-smoke-pass",
              "dashboard_status": "pending",
              "real_ai_demo": "pending"
            },
            "limitations": [
              "Unsigned Windows installer",
              "macOS artifacts not built",
              "Linux artifact not verified",
              "Some agent paths remain review-only or scaffolded"
            ]
          }
          EOF

          # Copy checksums
          cp artifacts/orqestra-windows-x64/dist/checksums.txt dist/checksums.txt 2>/dev/null || true

      - name: Validate manifest
        run: npx tsx scripts/validate-release-manifest.ts dist/release-manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            dist/release-manifest.json
            dist/checksums.txt
          draft: true
          generate_release_notes: false
          body_path: docs/release-notes-template.md

      - name: Upload release manifest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: dist/release-manifest.json
