name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: orqestra-windows-x64
          - os: macos-latest
            artifact-name: orqestra-macos-universal
          - os: ubuntu-latest
            artifact-name: orqestra-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install desktop npm dependencies
        run: cd apps/desktop && npm ci

      - name: Run workspace Rust tests
        run: cargo test --workspace

      - name: Build desktop frontend
        run: cd apps/desktop && npm run build

      - name: Build Tauri bundle (Windows/Linux)
        if: runner.os != 'macOS'
        run: cd apps/desktop && npx tauri build

      - name: Build Tauri bundle (macOS universal)
        if: runner.os == 'macOS'
        run: cd apps/desktop && npx tauri build --target universal-apple-darwin

      - name: Smoke check — verify installer artifact exists
        shell: bash
        run: |
          echo "Searching for installer artifacts..."
          find target -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null | head -20
          if find target -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null | read; then
            echo "✓ Installer artifact found"
          else
            echo "⚠ No standard installer artifact found — checking for binary"
            if find target -name "orqestra-desktop" -type f 2>/dev/null | read; then
              echo "✓ Binary found (bundling may not be configured for this platform)"
            else
              echo "✗ No build artifact found"
              exit 1
            fi
          fi

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            target/release/bundle/**
            target/universal-apple-darwin/release/bundle/**
            target/universal-apple-darwin/release/orqestra-desktop
            target/release/orqestra-desktop
            target/release/bundle/orqestra-desktop
          retention-days: 30

  create-release:
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            release-artifacts.json
          draft: true
          generate_release_notes: true
          body: |
            ## Orqestra Desktop Release

            **Unsigned artifacts** -- these artifacts are not code-signed or notarized.
            On Windows, you may need to click "More info" → "Run anyway" to install.
            On macOS, you may need to right-click → "Open" to bypass Gatekeeper.

            ### Artifacts
            - **Windows**: NSIS installer (`.exe`)
            - **macOS**: Universal binary (Apple Silicon + Intel) or separate arm64/x64
            - **Linux**: AppImage / deb package

            ### Feature State
            | Feature | Status |
            |---------|--------|
            | Roadmap parsing | Implemented and verified |
            | Desktop PM views | Implemented and verified |
            | Dashboard | Deployed at orqestra.pages.dev |
            | OS keychain credentials | Implemented and verified |
            | Docs/Bugfix agents | Implemented, review-only |
            | First-run onboarding | Implemented |
            | Diagnostics export | Implemented |
            | Architect agent | Mock-mode |
            | ML-Master | Stub/backlog |

      - name: Generate artifact manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA:0:12}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > release-artifacts.json << EOF
          {
            "version": "${VERSION}",
            "git_sha": "${SHA}",
            "built_at": "${DATE}",
            "platforms": {
              "windows-x64": { "artifact": "Orqestra_${VERSION#v}_x64-setup.exe", "signed": false },
              "macos": { "artifact": "Orqestra.app.tar.gz or .dmg", "signed": false },
              "linux-x64": { "artifact": "Orqestra_*.AppImage or .deb", "signed": false }
            },
            "known_limitations": ["Unsigned beta artifact", "macOS/Linux artifacts depend on CI runner"]
          }
          EOF
          cat release-artifacts.json
